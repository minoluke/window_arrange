<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個展配置シミュレーター</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <aside id="sidebar">
    <button id="sidebar-toggle" aria-label="設定パネルを開閉">▲ 設定</button>
    <div class="sidebar-section">
      <div class="wall-section-header">
        <h2>壁</h2>
        <button id="add-wall-btn">＋ 壁</button>
      </div>
      <div id="walls-list"></div>
    </div>

    <div class="sidebar-section">
      <div class="io-row">
        <button id="export-btn">↓ 保存</button>
        <label id="import-label">↑ 読み込み<input type="file" id="import-input" accept=".json"></label>
      </div>
    </div>

    <button id="add-btn">＋ 絵を追加</button>

    <div id="painting-settings" class="hidden">
      <div class="sidebar-section">
        <div class="painting-header">
          <h2>絵 <span id="sel-label"></span></h2>
          <div class="painting-header-actions">
            <button id="rotate-btn" title="90°回転">↻</button>
            <button id="duplicate-btn" title="複製">⎘</button>
            <button id="remove-btn">削除</button>
          </div>
        </div>

        <div class="field-row">
          <label>ラベル</label>
          <input type="text" id="p-name" maxlength="30" style="flex:1;">
        </div>
        <div class="field-row">
          <label>絵の幅</label>
          <input type="number" id="p-pw" min="5" max="500" step="1">
          <span class="field-unit">cm</span>
        </div>
        <div class="field-row">
          <label>絵の高さ</label>
          <input type="number" id="p-ph" min="5" max="500" step="1">
          <span class="field-unit">cm</span>
        </div>
        <div class="field-row">
          <label>ブロック幅</label>
          <input type="number" id="p-bw" min="1" max="200" step="0.5">
          <span class="field-unit">cm</span>
        </div>
        <div class="field-row">
          <label>ブロック高</label>
          <input type="number" id="p-bh" min="1" max="200" step="0.5">
          <span class="field-unit">cm</span>
        </div>
        <div class="field-row">
          <label>縁の太さ</label>
          <input type="number" id="p-mullion" min="0" max="30" step="0.5">
          <span class="field-unit">cm</span>
        </div>
        <div class="field-row">
          <label>額縁幅</label>
          <input type="number" id="p-frame" min="0" max="30" step="0.5">
          <span class="field-unit">cm</span>
        </div>

        <div class="field-row">
          <label>始点ずれ X</label>
          <input type="number" id="p-offx" min="-200" max="200" step="0.5">
          <span class="field-unit">cm</span>
        </div>
        <div class="field-row">
          <label>始点ずれ Y</label>
          <input type="number" id="p-offy" min="-200" max="200" step="0.5">
          <span class="field-unit">cm</span>
        </div>

        <div class="color-row" style="margin-top:10px;">
          <label>ガラス色</label>
          <input type="color" id="p-color-glass">
        </div>
        <div class="color-row">
          <label>縁の色</label>
          <input type="color" id="p-color-mullion">
        </div>
        <div class="color-row">
          <label>額縁の色</label>
          <input type="color" id="p-color-frame">
        </div>

        <div class="size-preview" id="size-preview"></div>
      </div>
    </div>
  </aside>

  <main id="canvas-area">
    <div id="wall-container"></div>
    <div id="zoom-controls">
      <button id="zoom-out" title="縮小">−</button>
      <button id="zoom-reset" title="フィット">⊡</button>
      <span id="zoom-level">100%</span>
      <button id="zoom-in" title="拡大">＋</button>
    </div>
  </main>

  <div id="drop-overlay">JSONファイルをドロップして読み込み</div>
  <div id="mobile-overlay"></div>
  <div id="mobile-fab">
    <button id="mob-add" aria-label="絵を追加">＋</button>
    <button id="mob-menu" aria-label="設定">☰</button>
  </div>

</div>
<script src="app.js"></script>
</body>
</html>
